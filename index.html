<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PassGuard — Password Strength & Breach Checker</title>
    <meta
      name="description"
      content="Check password strength and whether it has appeared in a data breach — privately, using k-anonymity. Nothing leaves your browser."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <header>
        <div class="topbar">
          <h1>🛡️ PassGuard</h1>
          <div id="langs" class="langs" role="group" aria-label="Language"></div>
        </div>
        <p class="tagline">
          <span id="tagline-text"></span>
          <strong id="privacy-text"></strong>
        </p>
      </header>

      <div class="field">
        <input
          id="password"
          type="password"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="Password to test"
        />
        <button id="toggle" type="button" aria-pressed="false">Show</button>
        <button id="generate" type="button"></button>
      </div>

      <div class="meter" role="progressbar" aria-label="Password strength">
        <div id="meter-fill" class="meter-fill"></div>
      </div>
      <p id="label" class="label"></p>

      <div id="stats" class="stats"></div>

      <ul id="warnings" class="warnings"></ul>

      <p id="breach" class="breach idle"></p>

      <details class="how">
        <summary id="how-summary"></summary>
        <p id="how-body"></p>
      </details>

      <footer>
        <a id="source-link" href="https://github.com/Ka1nnnn/passguard" target="_blank" rel="noopener"></a>
      </footer>
    </main>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
